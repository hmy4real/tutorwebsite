<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Tutoring</title>
  <link rel="icon" href="https://i.postimg.cc/N0rZb872/image.png" type="image/png">
  <style>
    :root {
      --bg-top: #f7f8fc;
      --bg-bottom: #e9eef7;
      --text: #111111;
      --muted: #6e6e73;
      --card: rgba(255, 255, 255, 0.72);
      --border: rgba(255, 255, 255, 0.82);
      --shadow: 0 24px 60px rgba(17, 17, 17, 0.08);
      --hero-size: clamp(2.4rem, 5vw, 5.2rem);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      overflow-x: hidden;
    }

    .page {
      width: min(1200px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 40px 0 28px;
    }

    .hero {
      text-align: center;
      padding: 32px 0 64px;
    }

    .hero-title {
      margin: 0;
      font-size: 3rem;
      line-height: 1.04;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .hero-subtitle {
      margin-top: 10px;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--muted);
    }

    .calendly-shell {
      border-radius: 36px;
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .calendly-inline-widget {
      height: 640px;
    }

    @media (max-width: 900px) {
      .page {
        width: min(100% - 20px, 1200px);
        min-height: 100vh;
        padding: 24px 0 20px;
      }

      .hero {
        padding: 18px 0 26px;
      }

      .hero-title {
        white-space: normal;
        font-size: clamp(2.1rem, 9vw, 4rem);
        line-height: 1.08;
      }

      .hero-subtitle {
        font-size: 1rem;
        margin-top: 14px;
      }

      .calendly-shell {
        width: 100%;
        border-radius: 14px;
      }

      .calendly-inline-widget {
        width: 100%;
        height: 700px;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1 class="hero-title">Semiahmoo's Best Tutor</h1>
      <div class="hero-subtitle">Your future self will thank you now.</div>
    </section>

    <section class="calendly-shell">
      <div
        class="calendly-inline-widget"
        data-url="https://calendly.com/stevehan926/1hr?hide_gdpr_banner=1"
      ></div>
    </section>
  </div>

  <script
    src="https://assets.calendly.com/assets/external/widget.js"
    async
  ></script>
</body>
</html>
